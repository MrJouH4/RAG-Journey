services:
  # Our Agentic RAG Service
  api_server:
    build: .
    container_name: rag-agent-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WATCHFILES_FORCE_POLLING=true  # This forces Watchfiles to use polling, which is more compatible with Docker volumes for hot-reloading.
    volumes:
      - ./app:/code/app          # Hot-reloads code changes instantly without rebuilding!
      - ./data:/code/data        # Persistent storage for your FAISS indices
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge