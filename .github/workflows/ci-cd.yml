name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code onto the runner machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up a clean, optimized Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cache dependencies to speed up future pipeline execution runs
    - name: Cache Python Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('03_deployment/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Install project requirements
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f 03_deployment/requirements.txt ]; then pip install -r 03_deployment/requirements.txt; fi

    # 5. Execute PyTest across our structural validation suites
    - name: Run Verification Tests
      run: |
        cd 03_deployment
        pytest